<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Five Crowns Game Report</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; }
    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px 0;
    }
    th, td {
      border: 2px solid #222;
      padding: 4px 6px;
      text-align: center;
      vertical-align: center;
      font-size: 1.4em;
    }
    th {
      background: #f2f2f2;
      font-size: 1.2em;
    }
    .round-header {
      font-weight: thin;
      font-size: 4.2em;
      background: #f9f9f9;
      text-align: center;
    }
    .gray-row {
      background: #e0e0e0;
    }
    .score-card {
      display: inline-block;
      margin-right: 6px;
      font-weight: 600;
    }
    .score-legend {
      margin: 8px 0 12px;
      text-align: center;
      font-size: 1.05em;
    }
    .scoreboard-scroll {
      max-height: 70vh;
      overflow-y: auto;
      border: 2px solid #222;
    }
  </style>
</head>
<body class="rules">
  <nav class="rules-nav">
    <a href="index.html">Game Board</a>
    <a href="5CrownPlay.html">How to Play</a>
    <a href="5CrownBooksAndRuns.html">Books and Runs</a>
    <a href="5CrownWilds.html">Wild Cards</a>
    <a href="5CrownGoingOut.html">Going Out</a>
    <a href="5CrownWinningTheGame.html">Winning</a>
    <a href="5CrownsDeckComposition.html">Deck</a>
    <a href="5CrownsSinglePlayer.html">Single Player</a>
    <a href="ScoreBoard.html">Scoreboard</a>
  </nav>
  <h2 style="text-align: center">Five Crowns Game Board Scores V02</h2>
  <div class="score-legend" aria-label="Suit color legend">
    <span class="score-card" style="color:red;">Hearts/Diamonds</span>
    <span class="score-card" style="color:black;">Spades/Clubs</span>
    <span class="score-card" style="color:orange;">Stars (orange)</span>
  </div>
<!-- or using the unicode character directly -->
  <div class="scoreboard-scroll">
    <table id="Scoring">
      <!-- Table will be generated by JavaScript -->
    </table>
  </div>

  <script>

    // Load data from localStorage, or fallback to empty array
    let Data = [];
    try {
      const currentGameId = localStorage.getItem('CurrentGameId');
      const scoreKey = currentGameId
        ? `scoreboard_data_${currentGameId}`
        : 'scoreboard_data';
      const stored = localStorage.getItem(scoreKey) || localStorage.getItem('scoreboard_data');
      if (stored) {
        Data = JSON.parse(stored);
        console.log("Loaded scoreboard data:", Data);
      }
    } catch (e) {
      Data = [];
    }

    function buildTable(data) {
      const table = document.getElementById('Scoring');
      // Header with <thead>
      table.innerHTML = `
        <thead>
          <tr>
            <th>Round</th>
            <th>Player</th>
            <th>Went Out</th>
            <th>Game</th>
            <th>Round</th>
            <th>Cards</th>
            <th>Hand</th>
            <th>Melds</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      let GrayLine = true;
      const tbody = table.querySelector('tbody');
      let roundNo = 0;
      data.forEach((roundObj) => {
        let wentOut = 0;
        roundObj.players.forEach((player) => {
          if (player.IsOut) wentOut++;
        });

        let totalCards = 0;
        let dealtCards = 0;
        let errorMsg = "";
        if (roundObj.round !== roundNo + 1) {
          errorMsg = `Error: Expected Round ${roundNo + 1} but found Round ${roundObj.round}`;
        }
        roundObj.players.forEach((player, idx) => {
          const tr = document.createElement('tr');
          // Round cell with rowspan for first player only
          if (idx === 0) {
            tr.innerHTML += `<td class="round-header" rowspan="${roundObj.players.length}">${roundObj.round}</td>`;
            dealtCards = roundObj.round + 2; 
            // corresponds to cards dealt (Round 1 = 3 cards, etc.)
          }
          totalCards = 0;
          // Player name
          tr.innerHTML += `<td>${player.name}</td>`;
          // Went Out
          tr.innerHTML += `<td>${player.IsOut ? "Yes" : "No"}</td>`;
          let wentOutBonus = 0;
          if (player.IsOut) {
            wentOutBonus = -roundNo - 2;
            wentOut++;
          } else {
            wentOutBonus = 0;
          }
          // Game Score - handle null/NaN
          const gameScore = (player.gameScore == null || isNaN(player.gameScore)) ? 0 : player.gameScore+wentOutBonus;
          
          tr.innerHTML += `<td>${gameScore}</td>`;
          // Round Score - handle null/NaN
          const roundScore = (player.roundScore == null || isNaN(player.roundScore)) ? 0 : player.roundScore+wentOutBonus;
          tr.innerHTML += `<td>${roundScore}</td>`;
          // Hand
          let handCount = 0;
          if (player.hand) {
            // Split hand by '|' and sum the cards in each hand
            const handArr = player.hand.split('|');
            handCount = handArr.reduce((sum, hand) => sum + (hand.trim() ? hand.split(',').length : 0), 0);
          }
          // Melds
          let meldCount = 0;
          if (player.melds) {
            // Split melds by '|' and sum the cards in each meld
            const meldArr = player.melds.split('|');
            meldCount = meldArr.reduce((sum, meld) => sum + (meld.trim() ? meld.split(',').length : 0), 0);
          }
          totalCards = handCount + meldCount;
          tr.innerHTML += `<td>${handCount + meldCount}</td>`;
          tr.innerHTML += `<td>${player.hand ?? ""}</td>`;
          tr.innerHTML += `<td>${player.melds ?? ""}</td>`;
          // Error
          if (wentOut === 0) {
            errorMsg = "N/A - No one went out";
          } else {
            if (totalCards !== dealtCards) { 
              errorMsg = `Error: ${totalCards} card(s) accounted for, but ${dealtCards} were dealt.`;
            }
          }
          tr.innerHTML += `<td>${errorMsg}</td>`;
          if (GrayLine) tr.className = "gray-row";
          GrayLine = !GrayLine;
          tbody.appendChild(tr);
        });
        roundNo++;
      });
    }
    buildTable(Data);
  </script>
  <button onclick="window.location.href='index.html'">Go to Game Board</button>
</body>
</html>
