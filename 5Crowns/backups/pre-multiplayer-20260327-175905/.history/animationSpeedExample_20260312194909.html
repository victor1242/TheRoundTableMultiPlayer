<!DOCTYPE html>
<html>
<body>
  <canvas id="gameCanvas" width="400" height="100" style="border:1px solid black"></canvas>
  <div>
    <button onclick="setSpeed(0.5)">0.5x</button>
    <button onclick="setSpeed(1)">1x</button>
    <button onclick="setSpeed(2)">2x</button>
    <button onclick="stepFrame()">Step</button>
  </div>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  let playerX = 0;
  let lastTime = 0;
  let gameSpeed = 1; // 1 = Normal speed
  let isPaused = false;
  let stepNextFrame = false;

  function gameLoop(timestamp) {
    let deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    if (!isPaused || stepNextFrame) {
      // Apply speed control to delta time
      let adjustedDelta = deltaTime * gameSpeed;
      
      // Update logic based on adjusted time (limit step)
      update(Math.min(adjustedDelta, 32)); // Cap delta to avoid huge jumps
      
      stepNextFrame = false; // Reset step flag
    }
    
    draw();
    requestAnimationFrame(gameLoop);
  }

  function update(dt) {
    playerX += 0.1 * dt; // Movement speed
    if (playerX > canvas.width) playerX = 0;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillRect(playerX, 40, 20, 20); // Draw player
  }

  // Speed Control
  function setSpeed(speed) {
    gameSpeed = speed;
    isPaused = false;
  }

  // Stepping Option
  function stepFrame() {
    isPaused = true;
    stepNextFrame = true;
  }

  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
