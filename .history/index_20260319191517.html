<div id="aiPanel" style="width: 300px; min-width: 180px; max-width: 300px; padding: 16px;">
<div class="game-directory" id="game-directory">
<div class="game-directory-title">Games Directory</div>
<label for="game-info-text" class="game-directory-label">Game info</label>
<input id="game-info-text" class="game-directory-input" type="text" 
    placeholder="Add notes about this game">
<div id="game-status" class="game-directory-status">Status: open</div>
<div class="game-directory-actions">
<button id="save-game" type="button">Save Game</button>
<select id="game-select" class="game-directory-list" size="6" aria-label="Saved games"></select>
</div>
<div id="ai-controls" style="margin-top:16px; padding:10px; background:#f0f8ff; border:2px  solid #4682b4; border-radius:5px; font-size:12px;">
<div style="font-weight:bold; margin-bottom:5px; color:#2c5aa0">🎮 AI Controls & Debugging</div>
<div style="margin-bottom:8px; font-size:12px; color:#555">
💡 <strong>Watch AI Think:</strong> Slow down (0.25x-0.5x) or use Step Mode to observe AI meld decisions in console
</div>
<div style="display:flex; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:8px">
<label style="font-weight:bold"><input type="checkbox" id="ai-auto-play"> AI Auto-Play</label>
<button id="ai-pause" style="padding:4px 12px; font-weight:bold; background:#ff9800; color:white; border:none; border-radius:4px; font-size:12px; cursor:pointer">Pause AI</button>
</div>
<div style="display:flex; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:8px">
<label style="font-weight:bold; display:flex; align-items:center; gap:6px">⚡ Speed
    <input id="ai-speed" type="range" min="0.25" max="4" step="0.25" value="1" style="vertical-align:middle; width:120px">
</label>
<span id="ai-speed-value" style="font-weight:bold; color:#d2691e; min-width:50px">1.0x</span>
</div>
<div style="display:flex; align-items:center; flex-wrap:wrap; gap:12px">
<label style="font-weight:bold"><input type="checkbox" id="ai-step-mode"> 🔍 Step Through Turns</label>
<button id="ai-step" style="padding:4px 12px; font-weight:bold; background:#4CAF50; color:white; border:none; border-radius:4px; font-size:12px; cursor:pointer" disabled>➡️ Next Step</button>
</div>
