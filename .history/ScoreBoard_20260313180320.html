<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Five Crowns Game Report</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; }
    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px 0;
    }
    th, td {
      border: 2px solid #222;
      padding: 4px 6px;
      text-align: center;
      vertical-align: center;
      font-size: 1.4em;
    }
    th {
      background: #f2f2f2;
      font-size: 1.2em;
    }
    .round-header {
      font-weight: thin;
      font-size: 4.2em;
      background: #f9f9f9;
      text-align: center;
    }
    .gray-row {
      background: #e0e0e0;
    }
    .score-card {
      display: inline-block;
      margin-right: 6px;
      font-weight: 600;
    }
    .score-legend {
      margin: 8px 0 12px;
      text-align: center;
      font-size: 1.05em;
    }
    .scoreboard-scroll {
      max-height: 70vh;
      overflow-y: auto;
      border: 2px solid #222;
    }
    .rank-legend {
      margin: 0 0 12px;
      text-align: center;
      font-size: 1em;
    }
    .rank-chip {
      display: inline-block;
      margin: 0 6px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid #444;
      font-weight: 700;
      font-size: 0.9em;
    }
    .rank-chip.first {
      background: #f2cf66;
      color: #2b2207;
    }
    .rank-chip.second {
      background: #d7dde5;
      color: #1f2630;
    }
    .rank-chip.third {
      background: #d7b28a;
      color: #2e1b0c;
    }
    .cell-list {
      margin: 0;
      padding-left: 20px;
      text-align: left;
      font-size: 0.8em;
    }
    .cell-list li {
      margin: 2px 0;
    }
    .meld-set-title {
      display: inline-block;
      min-width: 58px;
      font-weight: 700;
    }
    .rank-1 {
      background: #f7dc86;
      color: #2f2408;
    }
    .rank-2 {
      background: #e0e6ed;
      color: #222a33;
    }
    .rank-3 {
      background: #e1c09c;
      color: #332010;
    }
  </style>
</head>
<body class="rules">
  <nav class="rules-nav">
    <a href="index.html">Game Board</a>
    <a href="5CrownPlay.html">How to Play</a>
    <a href="5CrownBooksAndRuns.html">Books and Runs</a>
    <a href="5CrownWilds.html">Wild Cards</a>
    <a href="5CrownGoingOut.html">Going Out</a>
    <a href="5CrownWinningTheGame.html">Winning</a>
    <a href="5CrownsDeckComposition.html">Deck</a>
    <a href="5CrownsSinglePlayer.html">Single Player</a>
    <a href="ScoreBoard.html">Scoreboard</a>
  </nav>
  <h2 style="text-align: center">Five Crowns Game Board Scores V02</h2>
  <div class="score-legend" aria-label="Suit color legend">
    <span class="score-card" style="color:red;">Hearts/Diamonds</span>
    <span class="score-card" style="color:black;">Spades/Clubs</span>
    <span class="score-card" style="color:orange;">Stars (orange)</span>
  </div>
  <div class="rank-legend" aria-label="Ranking color legend">
    <span class="rank-chip first">1st place</span>
    <span class="rank-chip second">2nd place</span>
    <span class="rank-chip third">3rd place</span>
  </div>
<!-- or using the unicode character directly -->
  <div class="scoreboard-scroll">
    <table id="Scoring">
      <!-- Table will be generated by JavaScript -->
    </table>
  </div>

  <script>

    // Load data from localStorage, or fallback to empty array
    let Data = [];
    try {
      const currentGameId = localStorage.getItem('CurrentGameId');
      const scoreKey = currentGameId
        ? `scoreboard_data_${currentGameId}`
        : 'scoreboard_data';
      const stored = localStorage.getItem(scoreKey) || localStorage.getItem('scoreboard_data');
      if (stored) {
        Data = JSON.parse(stored);
        console.log("Loaded scoreboard data:", Data);
      }
    } catch (e) {
      Data = [];
    }

    function buildTable(data) {
      const table = document.getElementById('Scoring');

      function formatCardValue(card) {
        if (!card && card !== 0) return '';
        if (typeof card === 'string' || typeof card === 'number') return String(card);

        const rank = card.rank ?? card.value ?? '';
        const suit = card.suit ?? '';
        return suit ? `${rank}-${suit}` : String(rank);
      }

      function listMarkup(items) {
        const safeItems = Array.isArray(items) ? items.filter((item) => item || item === 0) : [];
        if (!safeItems.length) return '';
        const lis = safeItems.map((item) => `<li>${formatCardValue(item)}</li>`).join('');
        return `<ul class="cell-list">${lis}</ul>`;
      }

      function renderHandCell(player) {
        if (Array.isArray(player?.hand)) return listMarkup(player.hand);
        const handCount = player?.hand ?? player?.cards;
        return handCount ?? '';
      }

      function renderMeldSetsCell(player) {
        const meldSets = player?.meldSets;
        if (Array.isArray(meldSets) && meldSets.length) {
          const grouped = meldSets
            .map((set, idx) => {
              if (!Array.isArray(set) || !set.length) return '';
              const cards = set.map((card) => formatCardValue(card)).join(', ');
              return `<li><span class="meld-set-title">Set ${idx + 1}:</span>${cards}</li>`;
            })
            .filter(Boolean)
            .join('');
          return grouped ? `<ul class="cell-list">${grouped}</ul>` : '';
        }

        if (Array.isArray(player?.melds)) return listMarkup(player.melds);
        return player?.melds ?? '';
      }

      function getEffectiveGameScore(player) {
        const gameScore = Number(player?.gameScore);
        const safeGameScore = Number.isNaN(gameScore) ? 0 : gameScore;
        const bonus = Number(player?.wentOutBonus ?? 0);
        const safeBonus = Number.isNaN(bonus) ? 0 : bonus;
        return safeGameScore + safeBonus;
      }

      function buildRankMap(players) {
        const sorted = players
          .map((player, index) => ({ index, score: getEffectiveGameScore(player) }))
          .sort((a, b) => a.score - b.score);

        const rankMap = new Map();
        let previousScore = null;
        let rank = 0;

        sorted.forEach((entry, position) => {
          if (previousScore === null || entry.score !== previousScore) {
            rank = position + 1;
            previousScore = entry.score;
          }
          rankMap.set(entry.index, rank);
        });

        return rankMap;
      }

      // Header with <thead>
      table.innerHTML = `
        <thead>
          <tr>
            <th>Round</th>
            <th>Player</th>
            <th>Went Out</th>
            <th>wentOut Bonus</th>
            <th>Game</th>
            <th>Round</th>
            <th>Cards</th>
            <th>Hand</th>
            <th>Melds</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      let GrayLine = true;
      const tbody = table.querySelector('tbody');
      let roundNo = 0;
      let wentOutBonus = -(roundNo + 3);
      data.forEach((roundObj) => {
        let wentOut = 0;
        roundObj.players.forEach((player) => {
          if (player.IsOut) {
          wentOut++;
          player.wentOutBonus = wentOutBonus;
          }
        });
        let dealtCards = 0;
        let errorMsg = "";
        if (roundObj.round !== roundNo + 1) {
          errorMsg = `Error: Expected Round ${roundNo + 1} but found Round ${roundObj.round}`;
        }

        const rankMap = buildRankMap(roundObj.players);

        roundObj.players.forEach((player, idx) => {
          const tr = document.createElement('tr');
          // Round cell with rowspan for first player only
          if (idx === 0) {
            tr.innerHTML += `<td class="round-header" rowspan="${roundObj.players.length}">${roundObj.round}</td>`;
            dealtCards = roundObj.round + 2; 
            // corresponds to cards dealt (Round 1 = 3 cards, etc.)
          }
          // Player name
          tr.innerHTML += `<td>${player.name}</td>`;
          // Went Out
          tr.innerHTML += `<td>${player.IsOut ? "Yes" : "No"}</td>`;
          // Went Out Bonus - handle null/NaN
          tr.innerHTML += `<td>${player.wentOutBonus ?? "N/A"}</td>`;
          // Game Score - handle null/NaN
          const gameScore = getEffectiveGameScore(player);
          tr.innerHTML += `<td>${gameScore}</td>`;
          // Round Score - handle null/NaN
          const roundScore = (player.roundScore == null || isNaN(player.roundScore)) ? 0 : player.roundScore;
          tr.innerHTML += `<td>${roundScore}</td>`;
          // Hand
          let handCount = player.cards;
          tr.innerHTML += `<td>${handCount ?? ""}</td>`;

          tr.innerHTML += `<td>${renderHandCell(player)}</td>`;
          tr.innerHTML += `<td>${renderMeldSetsCell(player)}</td>`;
          // Error
          if (wentOut === 0) {
            errorMsg = "N/A - No one went out";
          } else {
            if (player.cards !== dealtCards) { 
              errorMsg = `Error: ${player.cards} card(s) accounted for, but ${dealtCards} were dealt.`;
            }
          }
          tr.innerHTML += `<td>${errorMsg}</td>`;
          const rank = rankMap.get(idx);
          if (rank === 1) tr.className = "rank-1";
          else if (rank === 2) tr.className = "rank-2";
          else if (rank === 3) tr.className = "rank-3";
          else if (GrayLine) tr.className = "gray-row";
          GrayLine = !GrayLine;
          tbody.appendChild(tr);
        });
        roundNo++;
      });
    }
    buildTable(Data);
  </script>
  <button onclick="window.location.href='index.html'">Go to Game Board</button>
</body>
</html>
