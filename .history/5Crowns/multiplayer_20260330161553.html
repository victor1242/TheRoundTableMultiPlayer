<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Crowns – Multiplayer</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a5c1a;
      color: #fff;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }
    h1 { margin: 0 0 12px; font-size: 1.6rem; }
    h2 { margin: 0 0 8px; font-size: 1.2rem; }
    h3 { margin: 4px 0; }

    /* ── Status bar ─────────────────────────────────────────── */
    .mp-status { padding: 6px 10px; border-radius: 4px; margin-bottom: 10px; background: #2d7a2d; font-size: .9rem; }
    .mp-status.error { background: #8b0000; }

    /* ── Lobby ──────────────────────────────────────────────── */
    #mp-lobby { max-width: 440px; background: #0f3d0f; border-radius: 8px; padding: 20px; }
    .mp-field { margin-bottom: 10px; }
    .mp-field label { display: block; margin-bottom: 4px; font-size: .9rem; }
    .mp-field input {
      width: 100%; padding: 8px; border-radius: 4px; border: none;
      font-size: 1rem;
    }
    #mp-room-code-display {
      font-size: 1.4rem; font-weight: bold; letter-spacing: 4px;
      background: #0a2a0a; padding: 8px 14px; border-radius: 6px;
      display: inline-block; margin: 8px 0; display: none;
    }
    #mp-player-list { list-style: none; padding: 0; margin: 8px 0; }
    #mp-player-list li { padding: 4px 0; border-bottom: 1px solid #2d5c2d; }
    .mp-btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .mp-btn {
      padding: 9px 18px; border: none; border-radius: 5px;
      font-size: .95rem; cursor: pointer; font-weight: bold;
    }
    .mp-btn.primary   { background: #2196F3; color: #fff; }
    .mp-btn.success   { background: #4CAF50; color: #fff; }
    .mp-btn.warning   { background: #FF9800; color: #fff; }
    .mp-btn.danger    { background: #c0392b; color: #fff; }
    .mp-btn.secondary { background: #555;    color: #fff; }
    .mp-btn:disabled  { opacity: .45; cursor: default; }

    /* ── Game area ───────────────────────────────────────────── */
    #mp-game { display: none; }
    .game-header {
      display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
      background: #0f3d0f; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px;
    }
    .game-header span { font-size: 1rem; font-weight: bold; }
    #mp-current-player { font-size: 1.1rem; background: #1e6b1e; padding: 4px 10px; border-radius: 4px; }

    /* ── Piles area ──────────────────────────────────────────── */
    .piles-row {
      display: flex; gap: 24px; align-items: flex-start;
      background: #0f3d0f; padding: 12px 14px; border-radius: 8px; margin-bottom: 12px;
    }
    .pile-area { text-align: center; }
    .pile-label { font-size: .8rem; opacity: .8; margin-bottom: 4px; }

    /* ── Cards ───────────────────────────────────────────────── */
    .mp-card {
      display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
      width: 60px; height: 88px; border-radius: 6px;
      background: #fff; border: 2px solid #ccc;
      cursor: pointer; margin: 3px; padding: 2px; font-size: .85rem;
      transition: transform .12s, border-color .12s;
      vertical-align: top;
    }
    .mp-card:hover { transform: translateY(-4px); border-color: #2196F3; }
    .mp-card.selected { border: 3px solid #2196F3; background: #e3f0ff; transform: translateY(-6px); }
    .mp-card.discardable:hover { border-color: #c0392b; }
    .mp-card.face { width: auto; height: auto; padding: 4px 8px; cursor: default; }
    .mp-card.empty { background: transparent; border-color: #555; color: #888; cursor: default; }
    .mp-card .card-rank { font-weight: bold; font-size: 1rem; }
    .mp-card .card-suit  { font-size: 1.1rem; }
    #mp-discard-card .mp-card { cursor: default; }
    /* When the discard pile is clickable, restore pointer on inner card too */
    #mp-discard-card.pile-clickable,
    #mp-discard-card.pile-clickable .mp-card { cursor: pointer; }

    /* ── Sections ────────────────────────────────────────────── */
    .mp-section {
      background: #0f3d0f; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px;
    }
    .mp-section h2 { margin: 0 0 8px; font-size: 1rem; opacity: .85; border-bottom: 1px solid #2d7a2d; padding-bottom: 4px; }

    .mp-hand-area { display: flex; flex-wrap: wrap; gap: 0; }
    #mp-meld-hint { font-size: .85rem; opacity: .75; margin-top: 4px; }

    .mp-meld-set { margin-bottom: 6px; }
    .mp-meld-set .mp-card { width: 50px; height: 74px; font-size: .78rem; }

    /* ── Opponents ───────────────────────────────────────────── */
    .mp-opponent {
      padding: 8px 10px; background: #1e5c1e; border-radius: 6px; margin-bottom: 8px;
    }
    .opp-meld { font-size: .82rem; margin-top: 4px; }

    /* ── Action buttons row ──────────────────────────────────── */
    #mp-actions {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      background: #0f3d0f; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px;
    }

    /* ── Round-over overlay ──────────────────────────────────── */
    #mp-round-over {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: #0a2a0a; border: 2px solid #4CAF50; border-radius: 10px;
      padding: 24px 32px; z-index: 100; min-width: 320px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .score-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .score-table th, .score-table td { border: 1px solid #3d7a3d; padding: 6px 10px; text-align: center; }
    .score-table th { background: #1e5c1e; }

    @media (max-width: 600px) {
      .game-header { flex-direction: column; align-items: flex-start; }
      .mp-card { width: 48px; height: 70px; }
    }
  </style>
</head>
<body>

<h1>🃏 Five Crowns – Multiplayer</h1>
<div id="mp-status" class="mp-status">Not connected</div>

<!-- ═══════════════════════ LOBBY ═══════════════════════════════ -->
<div id="mp-lobby">
  <div class="mp-field">
    <label for="mp-name-input">Your Name</label>
    <input id="mp-name-input" type="text" maxlength="20" placeholder="Enter your name">
  </div>
  <div class="mp-field">
    <label for="mp-room-input">Room Code <small>(leave blank to create a new room)</small></label>
    <input id="mp-room-input" type="text" maxlength="6" placeholder="e.g. ABC123" style="text-transform:uppercase">
  </div>
  <div class="mp-btn-row">
    <button id="mp-create-btn" class="mp-btn success">Create Room</button>
    <button id="mp-join-btn"   class="mp-btn primary">Join Room</button>
  </div>

  <div id="mp-room-code-display"></div>

  <h2 style="margin-top:16px">Players in room</h2>
  <ul id="mp-player-list"><li><em>No one yet</em></li></ul>
  <button id="mp-start-btn" class="mp-btn warning" style="display:none">▶ Start Game</button>
  <p style="font-size:.8rem; opacity:.7; margin-top:8px">
    Share the Room Code with other players (2–6 players required).<br>
    The host (👑) clicks Start Game when everyone has joined.
  </p>
</div>

<!-- ═══════════════════════ GAME ════════════════════════════════ -->
<div id="mp-game">

  <!-- Header -->
  <div class="game-header">
    <span id="mp-round">Round —</span>
    <span id="mp-wild">Wild: —</span>
    <span id="mp-deck-count">Deck: —</span>
    <span id="mp-current-player">—</span>
  </div>

  <!-- Piles -->
  <div class="piles-row">
    <div class="pile-area">
      <div class="pile-label">DRAW PILE</div>
      <div id="mp-deck-pile">
        <span id="mp-deck-back" style="display:inline-block; width:60px; height:88px; background:#1a3a8a; border-radius:6px; border:2px solid #5577cc; vertical-align:top;"></span>
      </div>
    </div>
    <div class="pile-area">
      <div class="pile-label">DISCARD PILE</div>
      <div id="mp-discard-card"></div>
    </div>
  </div>

  <!-- Action buttons -->
  <div id="mp-actions">
    <button id="mp-btn-meld"       class="mp-btn warning"   style="display:none">Meld / Discard</button>
    <button id="mp-btn-undo-melds" class="mp-btn secondary" style="display:none">Undo Melds</button>
  </div>
  <div id="mp-wild-reminder" style="padding: 0 14px 6px; font-size:.85rem; opacity:.9;"></div>
  <div id="mp-meld-hint" style="display:none; padding: 0 14px 10px; font-size:.85rem; opacity:.8;"></div>

  <!-- My hand -->
  <div class="mp-section">
    <h2>Your Hand</h2>
    <div id="mp-my-hand" class="mp-hand-area"></div>
  </div>

  <!-- My melds -->
  <div class="mp-section">
    <h2>Your Melds</h2>
    <div id="mp-my-melds"></div>
  </div>

  <!-- Opponents -->
  <div class="mp-section">
    <h2>Opponents</h2>
    <div id="mp-opponents"></div>
  </div>

</div><!-- #mp-game -->

<!-- Round-over / game-over overlay -->
<div id="mp-round-over"></div>

<!-- Socket.io client from CDN so this page also works when served by a static server on a different port -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script src="./multiplayerClient.js?v=20260330e"></script>

</body>
</html>
